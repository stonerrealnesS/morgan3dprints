<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Complete | Morgan 3D Prints</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    margin:0;
    background:#020617;
    color:#e5e7eb;
    font-family:system-ui, sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .box {
    background:#020b17;
    border:1px solid #1f2937;
    padding:30px 24px;
    border-radius:20px;
    max-width:420px;
    text-align:center;
  }
  h1 { margin:0 0 10px; font-size:22px; }
  p  { color:#9ca3af; font-size:14px; }
  .btn {
    margin-top:18px;
    padding:10px 20px;
    background:linear-gradient(135deg,#22c55e,#a3e635);
    border-radius:999px;
    color:#020617;
    font-weight:600;
    cursor:pointer;
    border:none;
  }
</style>
</head>
<body>
  <div class="box">
    <h1>Thank you! 🎉</h1>
    <p>Your order has been successfully placed using Square.</p>
    <p>We’ll contact you shortly with pickup or shipping details.</p>
    <button class="btn" onclick="location.href='/'">Return Home</button>
  </div>
</body>
</html>
